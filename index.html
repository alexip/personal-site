<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A quiet daily affirmation and journal prompt. New each day." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fbf8f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15171a" media="(prefers-color-scheme: dark)" />
    <title>A quiet moment — today</title>

    <link rel="canonical" href="https://alexip.github.io/personal-site/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="A quiet moment" />
    <meta property="og:title" content="A quiet moment" />
    <meta property="og:description" content="A daily affirmation and a prompt to sit with." />
    <meta property="og:url" content="https://alexip.github.io/personal-site/" />
    <meta property="og:image" content="https://alexip.github.io/personal-site/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="A quiet moment — a daily affirmation and a prompt to sit with." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A quiet moment" />
    <meta name="twitter:description" content="A daily affirmation and a prompt to sit with." />
    <meta name="twitter:image" content="https://alexip.github.io/personal-site/og.png" />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page" aria-live="polite">
      <header class="top">
        <p class="date" id="date" aria-label="Today's date"></p>
        <button
          id="theme-toggle"
          class="icon-btn"
          type="button"
          aria-label="Toggle dark mode"
          title="Toggle dark mode"
        >
          <span aria-hidden="true" id="theme-icon">◐</span>
        </button>
      </header>

      <section class="content">
        <p class="eyebrow">Today's affirmation</p>
        <p class="affirmation" id="affirmation">Loading…</p>

        <hr class="divider" aria-hidden="true" />

        <p class="eyebrow">A prompt to sit with</p>
        <p class="prompt" id="prompt">Loading…</p>

        <div class="actions">
          <button id="copy-btn" class="text-btn" type="button">Copy prompt</button>
          <span id="copy-status" class="copy-status" aria-live="polite"></span>
        </div>
      </section>

      <footer class="foot">
        <a href="about.html" class="text-link">About</a>
        <a href="archive.html" class="text-link">Past 30 days →</a>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
